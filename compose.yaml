services:
  django-app:
    build: .
    volumes:
      - ./db-data:/app/db-data
      - ./media:/app/media
    environment:
      DEBUG: ${DEBUG}
      SECRET_KEY: ${SECRET_KEY}

  nginx:
    image: nginx:latest
    ports:
      - "8001:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./media:/app/media
    depends_on:
      - django-app
  