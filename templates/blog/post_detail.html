{% extends "base.html" %}

{% block content %}
  <div>
      <h1>{{ post.title }}</h1>
      <p>{{ post.author }}</p>
      <p>{{ post.date }}</p>
      {% for tag in post.tags.all %}
        <a>{{ tag.name }}</a>
      {% endfor %}
      <p>{{ post.body }}</p>
  </div>
  {% if post.author.pk == request.user.pk %}
    <a href="{% url 'post_update' post.pk %}">Edit post</a>
    <a href="{% url 'post_delete' post.pk %}">Delete post</a>
  {% endif %}
{% endblock %}
