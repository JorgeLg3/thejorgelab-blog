{% extends "base.html" %}
{% load parser %}

{% block content %}
  <h1>New post</h1>
  <form action="" method="post">
    {% csrf_token %}

    {{ form }}

    <input type="submit" value="Save">
    <button type="submit" name="preview">Preview</button>
    <a href="{% url 'post_list' %}">Cancel</a>

    {% if preview %}
      <h2>Preview</h2>

      <div>
        {{ preview|markdownify }}
      </div>
    {% endif %}
  </form>
{% endblock %}
