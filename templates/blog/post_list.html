{% extends "base.html" %}

{% block content %}
  <ul>
    {% for post in post_list %}
      <li><a href="{{ post.get_absolute_url }}">{{ post.title }}</a></li>
    {% endfor %}
  </ul>
  {% if user.is_authenticated %}
    <a href="{% url 'post_create' %}">Create post</a>
  {% endif %}
{% endblock %}
